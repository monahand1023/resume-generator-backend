AWSTemplateFormatVersion: '2010-09-09'
Description: 'Resume Customizer Service - Main Stack'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Environment name

  LambdaCodeBucket:
    Type: String
    Description: S3 bucket containing Lambda deployment packages
    Default: resume-customizer-lambda-code

  TemplatesBucket:
    Type: String
    Description: S3 bucket containing nested CloudFormation templates
    Default: resume-customizer-cf-templates

  CorsOrigin:
    Type: String
    Default: "*"
    Description: CORS origin for API calls

  LambdaTimeout:
    Type: Number
    Default: 60
    MinValue: 30
    MaxValue: 900
    Description: Lambda function timeout in seconds

  LambdaMemorySize:
    Type: Number
    Default: 512
    MinValue: 128
    MaxValue: 10240
    Description: Lambda function memory size in MB

Mappings:
  EnvironmentMap:
    dev:
      LogRetentionDays: 7
      ReservedConcurrency: 5
    staging:
      LogRetentionDays: 14
      ReservedConcurrency: 10
    prod:
      LogRetentionDays: 30
      ReservedConcurrency: 50

Resources:
  # Lambda Function Stack
  LambdaStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub 'https://${TemplatesBucket}.s3.${AWS::Region}.amazonaws.com/lambda.yaml'
      Parameters:
        Environment: !Ref Environment
        StackName: !Ref AWS::StackName
        LambdaCodeBucket: !Sub '${LambdaCodeBucket}-${AWS::AccountId}'
        LambdaTimeout: !Ref LambdaTimeout
        LambdaMemorySize: !Ref LambdaMemorySize
        LogRetentionDays: !FindInMap [EnvironmentMap, !Ref Environment, LogRetentionDays]
        ReservedConcurrency: !FindInMap [EnvironmentMap, !Ref Environment, ReservedConcurrency]

  # API Gateway Stack
  ApiStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: LambdaStack
    Properties:
      TemplateURL: !Sub 'https://${TemplatesBucket}.s3.${AWS::Region}.amazonaws.com/api.yaml'
      Parameters:
        Environment: !Ref Environment
        StackName: !Ref AWS::StackName
        LambdaFunctionArn: !GetAtt LambdaStack.Outputs.LambdaFunctionArn
        CorsOrigin: !Ref CorsOrigin

Outputs:
  StackName:
    Description: Name of the CloudFormation stack
    Value: !Ref AWS::StackName
    Export:
      Name: !Sub '${AWS::StackName}-StackName'

  Environment:
    Description: Environment name
    Value: !Ref Environment
    Export:
      Name: !Sub '${AWS::StackName}-Environment'

  LambdaFunctionName:
    Description: Name of the Lambda function
    Value: !GetAtt LambdaStack.Outputs.LambdaFunctionName
    Export:
      Name: !Sub '${AWS::StackName}-LambdaFunctionName'

  LambdaFunctionArn:
    Description: ARN of the Lambda function
    Value: !GetAtt LambdaStack.Outputs.LambdaFunctionArn
    Export:
      Name: !Sub '${AWS::StackName}-LambdaFunctionArn'

  ApiGatewayUrl:
    Description: API Gateway endpoint URL
    Value: !GetAtt ApiStack.Outputs.ApiGatewayUrl
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayUrl'

  ApiGatewayId:
    Description: API Gateway ID
    Value: !GetAtt ApiStack.Outputs.ApiGatewayId
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayId'