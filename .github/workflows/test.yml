name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Vet
        run: go vet ./...
        env:
          CGO_ENABLED: "0"

      - name: Test
        run: go test -race ./...
        env:
          CGO_ENABLED: "0"
