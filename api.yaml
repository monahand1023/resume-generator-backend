AWSTemplateFormatVersion: '2010-09-09'
Description: 'Resume Customizer Service - API Gateway'

Parameters:
  Environment:
    Type: String
    Description: Environment name

  StackName:
    Type: String
    Description: Parent stack name

  LambdaFunctionArn:
    Type: String
    Description: ARN of the Lambda function

  CorsOrigin:
    Type: String
    Description: CORS origin for API calls

Resources:
  # API Gateway Rest API
  ResumeCustomizerApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${StackName}-ResumeCustomizerApi'
      Description: 'API for Resume Customizer Service'
      EndpointConfiguration:
        Types: [REGIONAL]

  # CORS Gateway Responses (like your working template)
  GatewayResponse4XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref ResumeCustomizerApi
      ResponseType: DEFAULT_4XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: !Sub "'${CorsOrigin}'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
      ResponseTemplates:
        application/json: '{"message": $context.error.messageString}'

  GatewayResponse5XX:
    Type: AWS::ApiGateway::GatewayResponse
    Properties:
      RestApiId: !Ref ResumeCustomizerApi
      ResponseType: DEFAULT_5XX
      ResponseParameters:
        gatewayresponse.header.Access-Control-Allow-Origin: !Sub "'${CorsOrigin}'"
        gatewayresponse.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
        gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
      ResponseTemplates:
        application/json: '{"message": "Internal server error"}'

  # API Gateway Resource for /api
  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ResumeCustomizerApi
      ParentId: !GetAtt ResumeCustomizerApi.RootResourceId
      PathPart: api

  # API Gateway Resource for /api/customize-resume
  CustomizeResumeResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ResumeCustomizerApi
      ParentId: !Ref ApiResource
      PathPart: customize-resume

  # Health check resource
  HealthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ResumeCustomizerApi
      ParentId: !GetAtt ResumeCustomizerApi.RootResourceId
      PathPart: health

  # OPTIONS method for CORS on customize-resume
  CustomizeResumeOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ResumeCustomizerApi
      ResourceId: !Ref CustomizeResumeResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: !Sub "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'POST,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: !Sub "'${CorsOrigin}'"
            ResponseTemplates:
              application/json: '{}'
        PassthroughBehavior: WHEN_NO_MATCH
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # POST method for customize-resume
  CustomizeResumePostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ResumeCustomizerApi
      ResourceId: !Ref CustomizeResumeResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunctionArn}/invocations'

  # Health check methods
  HealthGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ResumeCustomizerApi
      ResourceId: !Ref HealthResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunctionArn}/invocations'

  HealthOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ResumeCustomizerApi
      ResourceId: !Ref HealthResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: !Sub "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: !Sub "'${CorsOrigin}'"
            ResponseTemplates:
              application/json: '{}'
        PassthroughBehavior: WHEN_NO_MATCH
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  # Lambda Permissions
  LambdaPermissionForCustomizeResume:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref LambdaFunctionArn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ResumeCustomizerApi}/*/POST/api/customize-resume'

  LambdaPermissionForHealth:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref LambdaFunctionArn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ResumeCustomizerApi}/*/GET/health'

  # API Gateway Deployment
  ApiGatewayDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - CustomizeResumeOptionsMethod
      - CustomizeResumePostMethod
      - HealthGetMethod
      - HealthOptionsMethod
    Properties:
      RestApiId: !Ref ResumeCustomizerApi
      StageName: !Ref Environment

  # CloudWatch Log Group for API Gateway
  ApiGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/apigateway/${StackName}-ResumeCustomizerApi'
      RetentionInDays: 14

  # CloudWatch Alarm for API Gateway 4XX errors
  Api4XXErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${StackName}-API-4XX-Errors'
      AlarmDescription: 'API Gateway 4XX errors'
      MetricName: 4XXError
      Namespace: AWS/ApiGateway
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ApiName
          Value: !Sub '${StackName}-ResumeCustomizerApi'
        - Name: Stage
          Value: !Ref Environment
      TreatMissingData: notBreaching

  # CloudWatch Alarm for API Gateway 5XX errors
  Api5XXErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${StackName}-API-5XX-Errors'
      AlarmDescription: 'API Gateway 5XX errors'
      MetricName: 5XXError
      Namespace: AWS/ApiGateway
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ApiName
          Value: !Sub '${StackName}-ResumeCustomizerApi'
        - Name: Stage
          Value: !Ref Environment
      TreatMissingData: notBreaching

Outputs:
  ApiGatewayId:
    Description: ID of the API Gateway
    Value: !Ref ResumeCustomizerApi

  ApiGatewayUrl:
    Description: URL of the API Gateway
    Value: !Sub 'https://${ResumeCustomizerApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'

  ApiGatewayRootResourceId:
    Description: Root resource ID of the API Gateway
    Value: !GetAtt ResumeCustomizerApi.RootResourceId

  ApiStageName:
    Description: API Gateway stage name
    Value: !Ref Environment