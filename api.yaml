AWSTemplateFormatVersion: '2010-09-09'
Description: 'Resume Customizer Service - API Gateway'

Parameters:
  Environment:
    Type: String
    Description: Environment name

  StackName:
    Type: String
    Description: Parent stack name

  LambdaFunctionArn:
    Type: String
    Description: ARN of the Lambda function

  CorsOrigin:
    Type: String
    Description: CORS origin for API calls

Resources:
  # API Gateway Rest API
  ResumeCustomizerApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${StackName}-ResumeCustomizerApi'
      Description: 'API for Resume Customizer Service'
      EndpointConfiguration:
        Types: [REGIONAL]
      Policy:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: execute-api:Invoke
            Resource: '*'

  # API Gateway Deployment
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ApiMethodOptions
      - ApiMethodPost
    Properties:
      RestApiId: !Ref ResumeCustomizerApi
      StageName: !Ref Environment
      StageDescription: !Sub 'Deployment for ${Environment} environment'

  # API Gateway Stage
  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref ResumeCustomizerApi
      DeploymentId: !Ref ApiDeployment
      StageName: !Ref Environment
      Description: !Sub '${Environment} stage for Resume Customizer API'
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true
          ThrottlingBurstLimit: 200
          ThrottlingRateLimit: 100
      TracingConfig:
        TracingEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: ResumeCustomizer

  # API Gateway Resource for /api
  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ResumeCustomizerApi
      ParentId: !GetAtt ResumeCustomizerApi.RootResourceId
      PathPart: api

  # API Gateway Resource for /api/customize-resume
  CustomizeResumeResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ResumeCustomizerApi
      ParentId: !Ref ApiResource
      PathPart: customize-resume

  # API Gateway Resource for /api/format-document
  FormatDocumentResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ResumeCustomizerApi
      ParentId: !Ref ApiResource
      PathPart: format-document

  # OPTIONS method for CORS on customize-resume
  ApiMethodOptions:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ResumeCustomizerApi
      ResourceId: !Ref CustomizeResumeResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: !Sub "'${CorsOrigin}'"
            ResponseTemplates:
              application/json: ''
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: false
            method.response.header.Access-Control-Allow-Methods: false
            method.response.header.Access-Control-Allow-Origin: false

  # POST method for customize-resume
  ApiMethodPost:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ResumeCustomizerApi
      ResourceId: !Ref CustomizeResumeResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunctionArn}/invocations'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Origin: !Sub "'${CorsOrigin}'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: false
        - StatusCode: 400
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: false
        - StatusCode: 500
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: false

  # OPTIONS method for CORS on format-document
  FormatDocumentMethodOptions:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ResumeCustomizerApi
      ResourceId: !Ref FormatDocumentResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: !Sub "'${CorsOrigin}'"
            ResponseTemplates:
              application/json: ''
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: false
            method.response.header.Access-Control-Allow-Methods: false
            method.response.header.Access-Control-Allow-Origin: false

  # POST method for format-document
  FormatDocumentMethodPost:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ResumeCustomizerApi
      ResourceId: !Ref FormatDocumentResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunctionArn}/invocations'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Origin: !Sub "'${CorsOrigin}'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: false
        - StatusCode: 400
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: false
        - StatusCode: 500
          ResponseParameters:
            method.response.header.Access-Control-Allow-Origin: false

  # CloudWatch Log Group for API Gateway
  ApiGatewayLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/apigateway/${StackName}-ResumeCustomizerApi'
      RetentionInDays: 14

  # API Gateway Account (for CloudWatch logging)
  ApiGatewayAccount:
    Type: AWS::ApiGateway::Account
    Properties:
      CloudWatchRoleArn: !GetAtt ApiGatewayCloudWatchRole.Arn

  # IAM Role for API Gateway CloudWatch logging
  ApiGatewayCloudWatchRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonAPIGatewayPushToCloudWatchLogs

  # CloudWatch Alarm for API Gateway 4XX errors
  Api4XXErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${StackName}-API-4XX-Errors'
      AlarmDescription: 'API Gateway 4XX errors'
      MetricName: 4XXError
      Namespace: AWS/ApiGateway
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ApiName
          Value: !Sub '${StackName}-ResumeCustomizerApi'
        - Name: Stage
          Value: !Ref Environment
      TreatMissingData: notBreaching

  # CloudWatch Alarm for API Gateway 5XX errors
  Api5XXErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${StackName}-API-5XX-Errors'
      AlarmDescription: 'API Gateway 5XX errors'
      MetricName: 5XXError
      Namespace: AWS/ApiGateway
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ApiName
          Value: !Sub '${StackName}-ResumeCustomizerApi'
        - Name: Stage
          Value: !Ref Environment
      TreatMissingData: notBreaching

  # CloudWatch Alarm for API Gateway Latency
  ApiLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${StackName}-API-Latency'
      AlarmDescription: 'API Gateway latency'
      MetricName: Latency
      Namespace: AWS/ApiGateway
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 10000
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: ApiName
          Value: !Sub '${StackName}-ResumeCustomizerApi'
        - Name: Stage
          Value: !Ref Environment
      TreatMissingData: notBreaching

Outputs:
  ApiGatewayId:
    Description: ID of the API Gateway
    Value: !Ref ResumeCustomizerApi

  ApiGatewayUrl:
    Description: URL of the API Gateway
    Value: !Sub 'https://${ResumeCustomizerApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'

  ApiGatewayRootResourceId:
    Description: Root resource ID of the API Gateway
    Value: !GetAtt ResumeCustomizerApi.RootResourceId

  ApiStageName:
    Description: API Gateway stage name
    Value: !Ref Environment